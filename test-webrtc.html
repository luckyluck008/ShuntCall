<!DOCTYPE html>
<html>
<head>
    <title>ShuntCallWebRTC Test</title>
    <script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/nostr.js"></script>
    <script src="js/nostr-signaling.js"></script>
    <script src="js/webrtc.js"></script>
</head>
<body>
    <h1>ShuntCallWebRTC Test</h1>
    <div id="result"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const result = document.getElementById('result');
            try {
                console.log('Checking ShuntCallWebRTC...');
                console.log('window.ShuntCallWebRTC:', window.ShuntCallWebRTC);
                console.log('typeof window.ShuntCallWebRTC:', typeof window.ShuntCallWebRTC);
                
                if (window.ShuntCallWebRTC) {
                    result.innerHTML = '<p style="color: green;">✓ ShuntCallWebRTC is defined</p>';
                    result.innerHTML += `<p>Type: ${typeof window.ShuntCallWebRTC}</p>`;
                    if (typeof window.ShuntCallWebRTC === 'object') {
                        result.innerHTML += `<p>Properties: ${Object.keys(window.ShuntCallWebRTC).join(', ')}</p>`;
                    }
                } else {
                    result.innerHTML = '<p style="color: red;">✗ ShuntCallWebRTC is NOT defined</p>';
                }
                
                // Check other modules
                console.log('Nostr:', window.Nostr);
                console.log('NostrSignaling:', window.NostrSignaling);
            } catch (error) {
                console.error('Error:', error);
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
