<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShuntCall - Protocol Room</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* Custom Design Elements matching index.html */
    :root {
      color-scheme: dark;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #050505;
      color: #e5e5e5;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    
    /* P2P Network Grid Background */
    .bg-grid {
      background-size: 32px 32px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    }

    /* Minimalist technical inputs */
    .tech-input {
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid #262626;
      transition: all 0.2s ease;
    }
    .tech-input:focus {
      border-color: #ffffff;
      outline: none;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    /* Solid & Outline buttons */
    .btn-solid {
      background: #ffffff;
      color: #000000;
      border: 1px solid #ffffff;
      transition: all 0.2s ease;
    }
    .btn-solid:hover {
      background: #e5e5e5;
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent;
      color: #ffffff;
      border: 1px solid #333333;
      transition: all 0.2s ease;
    }
    .btn-outline:hover {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Video Container specific */
    .video-overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
    }
    
    /* Active states for toolbar */
    .toolbar-btn {
      transition: all 0.2s ease;
    }
    .toolbar-btn.active {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }
  </style>
</head>
<body class="bg-grid selection:bg-white selection:text-black h-screen overflow-hidden flex flex-col relative">
  
  <div id="passwordModal" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[100] hidden">
    <div class="bg-black border border-neutral-800 p-8 max-w-sm w-full relative group">
      <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
      
      <div class="flex items-center gap-3 mb-6">
        <span class="font-mono text-xs text-neutral-500 border border-neutral-800 px-2 py-1">AUTH</span>
        <h2 class="text-xl font-medium text-white">Join Channel</h2>
      </div>
      
      <label class="block font-mono text-xs text-neutral-400 uppercase mb-2">Decryption Key required</label>
      <input type="password" id="roomPassword" class="tech-input font-mono w-full px-4 py-3 text-sm text-white placeholder-neutral-600 rounded-sm mb-6" placeholder="••••••••••••">
      
      <button id="submitPassword" class="btn-solid w-full py-4 text-sm font-semibold uppercase tracking-wider rounded-sm">
        Authenticate
      </button>
      <div id="passwordError" class="hidden mt-4 p-3 border border-red-900 bg-red-950/30 text-red-400 font-mono text-xs rounded-sm"></div>
    </div>
  </div>

  <div id="loadingScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm hidden">
    <div class="text-center flex flex-col items-center">
      <div class="w-12 h-12 relative mb-6">
        <div class="absolute inset-0 border-2 border-neutral-800 border-t-white rounded-full animate-spin"></div>
      </div>
      <p class="font-mono text-xs text-neutral-400 animate-pulse tracking-widest uppercase" id="loadingText">Establishing Connection...</p>
    </div>
  </div>

  <div id="room" class="hidden flex-1 flex flex-col h-full w-full">
    
    <header class="absolute top-0 left-0 right-0 z-40 bg-gradient-to-b from-black/90 to-transparent p-6">
      <div class="max-w-[1600px] mx-auto flex justify-between items-start">
        <div class="flex items-center gap-4">
          <div>
            <h1 class="text-lg font-semibold tracking-tight text-white mb-1">ShuntCall</h1>
            <div class="flex items-center gap-2 font-mono text-xs">
              <span class="text-neutral-500">ID:</span>
              <span id="roomIdDisplay" class="text-white bg-white/10 px-2 py-0.5 rounded-sm"></span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-4 font-mono text-xs">
          <div class="flex items-center gap-2 bg-black/50 border border-neutral-800 px-3 py-1.5 rounded-sm backdrop-blur-md">
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div>
            <span id="peerCount" class="text-neutral-300">0 Peers</span>
          </div>
          <button id="toggleDebug" class="btn-outline px-3 py-1.5 rounded-sm text-neutral-400 hover:text-white">SYS.DBG</button>
        </div>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 pt-24 pb-32">
      <div class="max-w-[1600px] mx-auto h-full flex flex-col justify-center">
        <div class="grid grid-cols-[repeat(auto-fit,minmax(320px,1fr))] gap-4 auto-rows-fr" id="videoGrid">
          
          <div class="relative bg-neutral-900 border border-neutral-800 aspect-video group overflow-hidden rounded-sm" id="localContainer">
            <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover"></video>
            
            <div class="absolute inset-x-0 bottom-0 p-4 video-overlay flex justify-between items-end opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <div class="font-mono">
                <span class="text-[10px] text-neutral-500 block mb-1">LOCAL_NODE</span>
                <span class="text-sm text-white">You</span>
              </div>
                <div class="flex items-center gap-3">
                <select id="liveQualitySelector" class="bg-black/60 border border-neutral-600 text-neutral-300 text-[10px] font-mono px-2 py-1 rounded-sm focus:border-white focus:outline-none cursor-pointer">
                </select>
                <span class="text-[10px] text-neutral-500 font-mono">TX/RX OK</span>
                <span class="w-2 h-2 rounded-full bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]"></span>
              </div>
            </div>
          </div>
          
        </div>
      </div>
    </div>

    <div class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50">
      <div class="flex gap-2 p-2 bg-black/80 border border-neutral-800 backdrop-blur-xl rounded-sm shadow-2xl">
        <button id="toggleMic" class="toolbar-btn active w-14 h-14 flex items-center justify-center bg-transparent border border-transparent text-white hover:bg-neutral-800 rounded-sm" title="Toggle Microphone">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
          </svg>
        </button>
        <button id="toggleCamera" class="toolbar-btn active w-14 h-14 flex items-center justify-center bg-transparent border border-transparent text-white hover:bg-neutral-800 rounded-sm" title="Toggle Camera">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
          </svg>
        </button>
        <div class="w-px h-8 bg-neutral-800 self-center mx-2"></div>
        <button id="toggleScreen" class="w-14 h-14 flex items-center justify-center bg-transparent border border-transparent text-white hover:bg-neutral-800 transition-colors rounded-sm" title="Share Screen">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
        </button>
        <button id="togglePiP" class="w-14 h-14 flex items-center justify-center bg-transparent border border-transparent text-white hover:bg-neutral-800 transition-colors rounded-sm" title="Picture-in-Picture">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
          </svg>
        </button>
        <div class="w-px h-8 bg-neutral-800 self-center mx-2"></div>
        <button id="leaveRoom" class="w-14 h-14 flex items-center justify-center bg-transparent border border-transparent text-red-500 hover:bg-red-950/50 hover:text-red-400 transition-colors rounded-sm" title="Disconnect">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="debugPanel" class="fixed bottom-28 right-6 bg-black/95 backdrop-blur-xl p-6 rounded-sm text-xs font-mono hidden max-w-md border border-neutral-800 shadow-2xl z-50">
      <div class="flex items-center gap-2 mb-4 border-b border-neutral-800 pb-3">
        <svg class="w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <h3 class="font-medium text-white uppercase tracking-wider">System Log</h3>
      </div>
      <div id="debugContent" class="text-neutral-400 space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></div>
    </div>
  </div>

  <script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
  <script type="module">
     import { ShuntCallCrypto } from './js/crypto.js';
     import { Nostr } from './js/nostr.js';
     import { NostrSignaling } from './js/nostr-signaling.js';
     import { ShuntCallWebRTC } from './js/webrtc.js';
     import { ShuntCallRelayTree } from './js/relay-tree.js';
     
     // Expose modules globally
     window.ShuntCallCrypto = ShuntCallCrypto;
     window.Nostr = Nostr;
     window.NostrSignaling = NostrSignaling;
     window.ShuntCallWebRTC = ShuntCallWebRTC;
     window.ShuntCallRelayTree = ShuntCallRelayTree;
  </script>

  <script>
    // Security check for getUserMedia
    (function() {
      const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      if (!isSecure) {
        document.write('<div style="background:#000;border-bottom:1px solid #ef4444;color:#ef4444;padding:1rem;text-align:center;font-family:monospace;font-size:12px;text-transform:uppercase;z-index:9999;position:relative;">[System Alert] HTTPS required for secure media transmission.</div>');
      }
    })();

    const App = {
      roomId: null,
      password: null,
      roomTag: null,
      localStream: null,
      peers: new Map(),
      signaling: null,
      webrtc: null,
      isAudioEnabled: true,
      isVideoEnabled: true,

      async init() {
        const params = new URLSearchParams(window.location.search);
        this.roomId = params.get('room');
        
        if (!this.roomId) {
          window.location.href = 'index.html';
          return;
        }

        document.getElementById('roomIdDisplay').textContent = this.roomId;

        this.setupPasswordModal();
      },

      setupPasswordModal() {
        // Check if password is in sessionStorage
        const storedPassword = sessionStorage.getItem('shuntcall_password');
        const storedRoomId = sessionStorage.getItem('shuntcall_roomId');
        
        console.log('Stored password:', storedPassword ? 'yes' : 'no');
        console.log('Stored roomId:', storedRoomId);
        
        if (storedPassword && storedRoomId === this.roomId) {
          console.log('Using stored password');
          this.password = storedPassword;
          sessionStorage.removeItem('shuntcall_roomId');
          sessionStorage.removeItem('shuntcall_password');
          document.getElementById('passwordModal').style.display = 'none';
          this.initRoom();
          return;
        }

        // Show the modal
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passwordModal').classList.remove('hidden');
        
        const input = document.getElementById('roomPassword');
        const submit = document.getElementById('submitPassword');
        const error = document.getElementById('passwordError');

        submit.addEventListener('click', async () => {
          const password = input.value.trim();
          if (!password) {
            error.textContent = 'Decryption key is required.';
            error.classList.remove('hidden');
            return;
          }
          
          this.password = password;
          document.getElementById('passwordModal').style.display = 'none';
          await this.initRoom();
        });

        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            submit.click();
          }
        });
      },

       async initRoom() {
         document.getElementById('passwordModal').classList.add('hidden');
         this.showLoading('Initializing Nostr Protocol...');

         try {
           // Compute room tag
           this.roomTag = await this.computeRoomTag(this.roomId, this.password);
           console.log('Room tag:', this.roomTag);

           // Initialize media with retry logic
           let mediaInitialized = false;
           let mediaRetryCount = 0;
           const maxMediaRetries = 2;

           while (!mediaInitialized && mediaRetryCount < maxMediaRetries) {
             try {
               await this.initMedia();
               mediaInitialized = true;
             } catch (mediaError) {
               mediaRetryCount++;
               console.warn(`Media initialization attempt ${mediaRetryCount} failed:`, mediaError);
               if (mediaRetryCount >= maxMediaRetries) {
                 throw mediaError;
               }
               // Wait 1 second before retrying
               await new Promise(resolve => setTimeout(resolve, 1000));
             }
           }

            // Initialize Nostr signaling
           this.signaling = NostrSignaling;
           console.log('Initializing signaling...');
           await this.signaling.init(this.roomId, this.password);
           console.log('Signaling initialized');

           // Get our pubkey
           const ourPubkey = this.signaling.nostr.keys.publicKey;
           console.log('Our pubkey:', ourPubkey.slice(0, 16) + '...');

              // Initialize WebRTC
              this.webrtc = ShuntCallWebRTC;
              this.webrtc.init(this.localStream, ourPubkey, this.signaling);
              this.webrtc.setVideoQuality(this.mediaOptions.videoQuality);
              
              this.populateLiveQualitySelector();
              
              // Initialize Relay Tree
             this.relayTree = ShuntCallRelayTree;
             this.relayTree.init(ourPubkey, this.webrtc);
             
             // Setup signaling presence listener
             this.signaling.on('presence', async (data) => {
               console.log('Room: Received presence from', data.from.slice(0, 16) + '...');
               await this.webrtc.handlePresence(data.from);
             });

             // Setup WebRTC event handlers
             this.webrtc.on('remoteStream', (data) => {
               console.log('Remote stream from:', data.peerId.slice(0, 16) + '...');
               this.addRemoteStream(data.peerId, data.stream);
             });
             
             this.webrtc.on('peerDisconnected', (data) => {
               console.log('Peer disconnected:', data.peerId.slice(0, 16) + '...');
               this.removePeer(data.peerId);
             });

             // Relay Tree event handlers
             this.relayTree.on('peerAdded', (data) => {
               console.log('Peer added to relay tree:', {
                 peerId: data.peerId.slice(0, 8),
                 parentId: data.parentId?.slice(0, 8),
                 hops: data.hops
               });
               this.addDebugMessage(`RELAY_PEER_ADDED: ${data.peerId.slice(0, 8)} (${data.hops}H)`);
             });
             
             this.relayTree.on('peerRemoved', (data) => {
               console.log('Peer removed from relay tree:', data.peerId.slice(0, 8));
               this.addDebugMessage(`RELAY_PEER_REMOVED: ${data.peerId.slice(0, 8)}`);
             });
             
             this.relayTree.on('peerReconnected', (data) => {
               console.log('Peer reconnected in relay tree:', {
                 peerId: data.peerId.slice(0, 8),
                 newParentId: data.newParentId?.slice(0, 8)
               });
               this.addDebugMessage(`RELAY_PEER_RECONNECTED: ${data.peerId.slice(0, 8)} → ${data.newParentId?.slice(0, 8)}`);
             });
             
             this.relayTree.on('treeReorganized', (data) => {
               console.log('Relay tree reorganized');
               this.addDebugMessage('RELAY_TREE_REORGANIZED');
               console.log(this.relayTree.getAsciiTree());
             });
             
             this.relayTree.on('bandwidthUpdate', (data) => {
               console.log('Bandwidth update:', {
                 peerId: data.peerId.slice(0, 8),
                 download: `${data.download.toFixed(1)}Mbps`,
                 upload: `${data.upload.toFixed(1)}Mbps`
               });
             });

             this.webrtc.on('trackReceived', (data) => {
               console.log('Track received:', {
                 peerId: data.peerId.slice(0, 8),
                 kind: data.kind,
                 trackId: data.track.id,
                 streamId: data.stream.id
               });
               this.addDebugMessage(`TRACK_RECEIVED: ${data.kind} from ${data.peerId.slice(0, 8)}...`);
             });
             this.webrtc.on('trackError', (data) => {
               console.error('Track error:', data);
               this.addDebugMessage(`TRACK_ERROR: ${data.kind} from ${data.peerId.slice(0, 8)} - ${data.error}`);
             });

             this.webrtc.on('trackEnded', (data) => {
               console.log('Track ended:', data);
               this.addDebugMessage(`TRACK_ENDED: ${data.kind} from ${data.peerId.slice(0, 8)}`);
             });

             this.webrtc.on('connectionStateChange', (data) => {
               console.log('Connection state:', data.peerId?.slice(0, 16), data.state);
               this.updatePeerStatus(data.peerId, data.state);
               this.addDebugMessage(`CONNECTION_STATE: ${data.peerId?.slice(0, 8)} - ${data.state}`);
             });

            // Broadcast our presence
            console.log('Broadcasting presence...');
            await this.signaling.broadcastPresence();
            
            // Debug: Log relay tree
            console.log('Initial Relay Tree:');
            console.log(this.relayTree.getAsciiTree());

           this.setupEventListeners();
           this.updatePeerCount();

           document.getElementById('loadingScreen').classList.add('hidden');
           document.getElementById('room').classList.remove('hidden');

         } catch (error) {
           console.error('Init error:', error);
           this.showError('Connection failed', error.message);
           // Add a retry button to the error modal
           setTimeout(() => {
             const errorOkBtn = document.getElementById('errorOk');
             if (errorOkBtn) {
               errorOkBtn.textContent = 'Retry';
               errorOkBtn.onclick = () => {
                 document.getElementById('errorModal').remove();
                 this.initRoom();
               };
             }
           }, 100);
         }
       },

      async computeRoomTag(roomId, password) {
        const input = roomId + ':' + password;
        const encoder = new TextEncoder();
        const data = encoder.encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      },

      showLoading(text) {
        document.getElementById('loadingText').textContent = text;
        document.getElementById('loadingScreen').classList.remove('hidden');
        document.getElementById('room').classList.add('hidden');
      },

        async initMedia() {
          const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
          
          if (!isSecure) {
            throw new Error('System requires HTTPS or localhost for media access.');
          }

          // Show media permission prompt
          await this.detectWebcamCapabilities();
          this.showMediaPermissionModal();
          
          // Wait for user to confirm
          await new Promise((resolve, reject) => {
            this.mediaPermissionResolve = resolve;
            this.mediaPermissionReject = reject;
          });

          try {
            // Validate that at least one media type is enabled
            if (!this.mediaOptions.video && !this.mediaOptions.audio) {
              throw new Error('At least one media type (audio or video) must be enabled.');
            }

            const qualityMap = {
              '480p': { width: 854, height: 480 },
              '720p': { width: 1280, height: 720 },
              '1080p': { width: 1920, height: 1080 },
              '1440p': { width: 2560, height: 1440 },
              '4k': { width: 3840, height: 2160 },
              '8k': { width: 7680, height: 4320 }
            };
            const quality = this.mediaOptions.videoQuality || '720p';
            const videoSettings = qualityMap[quality] || qualityMap['720p'];

            this.localStream = await navigator.mediaDevices.getUserMedia({
              video: this.mediaOptions.video ? {
                width: { ideal: videoSettings.width },
                height: { ideal: videoSettings.height },
                frameRate: { ideal: 30 }
              } : false,
              audio: this.mediaOptions.audio ? {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
              } : false
            });

            const localVideo = document.getElementById('localVideo');
            
            // Check if this.localStream is a valid MediaStream object before setting srcObject
            if (this.localStream && typeof this.localStream === 'object' && 'getTracks' in this.localStream) {
              // Try to set srcObject - only works if we have a real MediaStream
              try {
                if (typeof this.localStream.getAudioTracks === 'function' && typeof this.localStream.getVideoTracks === 'function') {
                  localVideo.srcObject = this.localStream;
                  console.log('Media initialized');
                  
                  // Handle stream ended events
                  this.localStream.getTracks().forEach(track => {
                    track.onended = () => {
                      console.warn(`Media track ended: ${track.kind}`);
                      this.handleTrackEnded(track.kind);
                    };
                    
                    track.onerror = (error) => {
                      console.error(`Media track error: ${track.kind}`, error);
                      this.handleTrackEnded(track.kind);
                    };
                  });
                  
                  // Verify tracks are actually live
                  const audioTracks = this.localStream.getAudioTracks();
                  const videoTracks = this.localStream.getVideoTracks();
                  
                  audioTracks.forEach(track => {
                    if (track.readyState !== 'live') {
                      console.warn(`Audio track not live: ${track.readyState}`);
                    }
                  });
                  
                  videoTracks.forEach(track => {
                    if (track.readyState !== 'live') {
                      console.warn(`Video track not live: ${track.readyState}`);
                    }
                  });
                  
                  console.log(`Media tracks: ${audioTracks.length} audio, ${videoTracks.length} video`);
                } else {
                  console.warn('Mock stream detected - skipping srcObject assignment');
                }
              } catch (e) {
                console.warn('Failed to set video srcObject:', e.message);
              }
            } else {
              console.warn('No valid media stream available');
            }

          } catch (error) {
            console.error('Media error:', error);
            this.showError('Hardware access error', error.message);
            throw error;
          }
        },

        async detectWebcamCapabilities() {
          try {
            const testStream = await navigator.mediaDevices.getUserMedia({
              video: { width: { ideal: 3840 }, height: { ideal: 2160 } },
              audio: false
            });
            
            const videoTrack = testStream.getVideoTracks()[0];
            const settings = videoTrack.getSettings();
            
            this.webcamCapabilities = {
              width: settings.width || 1920,
              height: settings.height || 1080,
              frameRate: settings.frameRate || 30
            };
            
            console.log('Webcam capabilities:', this.webcamCapabilities);
            
            const qualityOrder = ['8k', '4k', '1440p', '1080p', '720p', '480p'];
            const widthMap = { '480p': 854, '720p': 1280, '1080p': 1920, '1440p': 2560, '4k': 3840, '8k': 7680 };
            
            this.supportedQualities = qualityOrder.filter(q => widthMap[q] <= this.webcamCapabilities.width);
            
            if (this.supportedQualities.length === 0) {
              this.supportedQualities = ['480p'];
            }
            
            console.log('Supported qualities:', this.supportedQualities);
            
            testStream.getTracks().forEach(t => t.stop());
          } catch (error) {
            console.warn('Could not detect webcam capabilities, using defaults:', error);
            this.webcamCapabilities = { width: 1920, height: 1080, frameRate: 30 };
            this.supportedQualities = ['480p', '720p', '1080p', '1440p', '4k', '8k'];
          }
        },

        generateQualityOptions() {
          const qualityLabels = {
            '480p': '480p (854×480)',
            '720p': '720p (1280×720)',
            '1080p': '1080p (1920×1080)',
            '1440p': '1440p (2560×1440)',
            '4k': '4K (3840×2160)',
            '8k': '8K (7680×4320)'
          };
          
          const qualities = this.supportedQualities || ['720p'];
          const defaultQuality = qualities.includes('720p') ? '720p' : qualities[0];
          
          return qualities.map(q => 
            `<option value="${q}" ${q === defaultQuality ? 'selected' : ''}>${qualityLabels[q] || q}</option>`
          ).join('');
        },

        populateLiveQualitySelector() {
          const select = document.getElementById('liveQualitySelector');
          if (!select) return;
          
          const qualities = this.supportedQualities || this.webrtc?.getAvailableQualities() || ['720p'];
          const currentQuality = this.mediaOptions.videoQuality || '720p';
          
          select.innerHTML = qualities.map(q => 
            `<option value="${q}" ${q === currentQuality ? 'selected' : ''}>${q.toUpperCase()}</option>`
          ).join('');
        },

        showMediaPermissionModal() {
         // Create styled media permission modal
         const modal = document.createElement('div');
         modal.className = 'fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[110]';
         modal.id = 'mediaPermissionModal';
         modal.innerHTML = `
           <div class="bg-black border border-neutral-800 p-8 max-w-sm w-full relative">
             <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
             
             <div class="flex items-center gap-3 mb-6">
               <span class="font-mono text-xs text-neutral-500 border border-neutral-800 px-2 py-1">SYS.HW</span>
               <h2 class="text-xl font-medium text-white">Hardware Access</h2>
             </div>
             
             <p class="text-neutral-400 text-sm mb-6">Configure transmission parameters:</p>

              <div class="space-y-4 mb-8 font-mono text-sm">
                <label class="flex items-center gap-4 cursor-pointer group">
                  <input type="checkbox" id="enableVideo" checked class="w-4 h-4 accent-white bg-black border-neutral-600">
                  <span class="text-neutral-300 group-hover:text-white transition-colors">Video Transmission</span>
                </label>
                <label class="flex items-center gap-4 cursor-pointer group">
                  <input type="checkbox" id="enableAudio" checked class="w-4 h-4 accent-white bg-black border-neutral-600">
                  <span class="text-neutral-300 group-hover:text-white transition-colors">Audio Transmission</span>
                </label>
                <div id="videoQualityContainer" class="ml-8 mt-2">
                  <label class="text-neutral-500 text-xs mb-2 block">Resolution:</label>
                  <select id="videoQuality" class="w-full bg-black border border-neutral-600 text-neutral-300 text-sm px-3 py-2 rounded-sm focus:border-white focus:outline-none">
                    ${this.generateQualityOptions()}
                  </select>
                </div>
              </div>

             <div class="flex gap-3">
               <button id="mediaPermissionAccept" class="btn-solid flex-1 py-3 text-xs font-semibold uppercase tracking-wider rounded-sm">
                 Authorize
               </button>
               <button id="mediaPermissionDecline" class="btn-outline flex-1 py-3 text-xs font-semibold uppercase tracking-wider rounded-sm text-neutral-400">
                 Deny
               </button>
             </div>
           </div>
         `;
         
         document.body.appendChild(modal);
         
          this.mediaOptions = {
            video: true,
            audio: true,
            videoQuality: '720p'
          };
          
          document.getElementById('enableVideo').addEventListener('change', (e) => {
            this.mediaOptions.video = e.target.checked;
            document.getElementById('videoQualityContainer').style.display = e.target.checked ? 'block' : 'none';
          });
          
          document.getElementById('enableAudio').addEventListener('change', (e) => {
            this.mediaOptions.audio = e.target.checked;
          });
          
          document.getElementById('videoQuality').addEventListener('change', (e) => {
            this.mediaOptions.videoQuality = e.target.value;
          });
         
         document.getElementById('mediaPermissionAccept').addEventListener('click', () => {
           modal.remove();
           this.mediaPermissionResolve();
         });
         
         document.getElementById('mediaPermissionDecline').addEventListener('click', () => {
           modal.remove();
           this.mediaPermissionReject(new Error('Hardware access denied by user.'));
         });
       },

       showError(title, message) {
         // Create error modal
         const modal = document.createElement('div');
         modal.className = 'fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[110]';
         modal.id = 'errorModal';
         modal.innerHTML = `
           <div class="bg-black border border-red-900/50 p-8 max-w-sm w-full relative">
             <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-red-500/30 to-transparent"></div>
             
             <div class="flex items-center gap-3 mb-6">
               <span class="font-mono text-xs text-red-500 border border-red-900 px-2 py-1">ERROR</span>
               <h2 class="text-xl font-medium text-white">${title}</h2>
             </div>
             
             <p class="text-red-400 text-sm mb-6 font-mono">${message}</p>

             <div class="flex gap-3">
               <button id="errorOk" class="btn-solid flex-1 py-3 text-xs font-semibold uppercase tracking-wider rounded-sm">
                 OK
               </button>
             </div>
           </div>
         `;
         
         document.body.appendChild(modal);
         
         document.getElementById('errorOk').addEventListener('click', () => {
           modal.remove();
         });
       },

       handleTrackEnded(kind) {
         console.warn(`${kind} track ended unexpectedly`);
         // Show warning to user
         const modal = document.createElement('div');
         modal.className = 'fixed top-6 right-6 bg-black/90 backdrop-blur-md border border-neutral-800 p-4 z-[110]';
         modal.innerHTML = `
           <div class="flex items-center gap-3">
             <span class="font-mono text-xs text-yellow-500 border border-yellow-900 px-2 py-1">WARNING</span>
             <p class="text-yellow-400 text-sm">${kind} track ended unexpectedly. Check your device.</p>
           </div>
         `;
         
         document.body.appendChild(modal);
         
         // Auto remove after 5 seconds
         setTimeout(() => {
           if (modal.parentNode) {
             modal.remove();
           }
         }, 5000);
       },

         addRemoteStream(peerId, stream) {
           if (this.peers.has(peerId)) return;
          
          console.log('Adding remote stream:', {
            peerId: peerId.slice(0, 8),
            streamId: stream.id,
            tracks: stream.getTracks().map(t => ({
              kind: t.kind,
              id: t.id,
              readyState: t.readyState,
              enabled: t.enabled
            })),
            active: stream.active
          });
          
          const grid = document.getElementById('videoGrid');
          
          const container = document.createElement('div');
          container.className = 'relative bg-neutral-900 border border-neutral-800 aspect-video group overflow-hidden rounded-sm';
          container.id = `container-${peerId}`;

          const video = document.createElement('video');
          video.autoplay = true;
          video.playsInline = true;
          video.srcObject = stream;
          video.className = 'w-full h-full object-cover';
          
          // Add video element error handling
          video.onerror = (e) => {
            console.error('Video element error:', e);
            this.showError('Video playback error', 'Failed to display remote video');
          };
          
          video.onloadedmetadata = () => {
            console.log('Video metadata loaded:', {
              width: video.videoWidth,
              height: video.videoHeight,
              duration: video.duration
            });
          };
          
          video.onwaiting = () => {
            console.log('Video waiting for data');
          };
          
          video.onplaying = () => {
            console.log('Video is playing');
          };

         const overlay = document.createElement('div');
         overlay.className = 'absolute inset-x-0 bottom-0 p-4 video-overlay flex justify-between items-end opacity-0 group-hover:opacity-100 transition-opacity duration-300';

         overlay.innerHTML = `
           <div class="font-mono">
             <span class="text-[10px] text-neutral-500 block mb-1">REMOTE_NODE</span>
             <span class="text-sm text-white">${peerId.slice(0, 8)}...</span>
           </div>
           <div class="flex items-center gap-2">
             <span class="text-[10px] text-neutral-500 font-mono">RX</span>
             <span class="w-2 h-2 rounded-full bg-neutral-600 transition-colors duration-300" id="status-${peerId}"></span>
           </div>
         `;

         container.appendChild(video);
         container.appendChild(overlay);
         grid.appendChild(container);
         
         this.peers.set(peerId, { stream, container });
         this.updatePeerCount();
         
         // Add peer to relay tree
         this.relayTree.addPeer(peerId);
       },

      removePeer(peerId) {
        const peer = this.peers.get(peerId);
        if (peer) {
          peer.container.remove();
          this.peers.delete(peerId);
        }
        
        if (this.webrtc) {
          this.webrtc.closePeerConnection(peerId);
        }
        
        this.updatePeerCount();
      },

      updatePeerStatus(peerId, state) {
        const statusEl = document.getElementById(`status-${peerId}`);
        if (statusEl) {
          // Reset classes
          statusEl.className = 'w-2 h-2 rounded-full transition-all duration-300';
          
          if (state === 'connected') {
            statusEl.classList.add('bg-white', 'shadow-[0_0_8px_rgba(255,255,255,0.8)]');
          } else if (state === 'connecting' || state === 'new') {
            statusEl.classList.add('bg-neutral-500', 'animate-pulse');
          } else {
            statusEl.classList.add('bg-red-500');
          }
        }
      },

       addDebugMessage(message) {
         const debugContent = document.getElementById('debugContent');
         const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
         const div = document.createElement('div');
         div.className = 'debug-entry';
         div.textContent = `[${timestamp}] ${message}`;
         debugContent.appendChild(div);
         debugContent.scrollTop = debugContent.scrollHeight;
       },

       updatePeerCount() {
         const count = this.peers.size + 1;
         document.getElementById('peerCount').textContent = `${count} Node${count !== 1 ? 's' : ''}`;
       },

      setupEventListeners() {
        document.getElementById('toggleMic').addEventListener('click', (e) => {
          this.isAudioEnabled = !this.isAudioEnabled;
          this.localStream.getAudioTracks().forEach(track => {
            track.enabled = this.isAudioEnabled;
          });
          const btn = e.currentTarget;
          if(this.isAudioEnabled) {
            btn.classList.add('active', 'bg-white', 'text-black');
            btn.classList.remove('bg-transparent', 'text-white');
          } else {
            btn.classList.remove('active', 'bg-white', 'text-black');
            btn.classList.add('bg-transparent', 'text-white');
          }
        });

        document.getElementById('toggleCamera').addEventListener('click', (e) => {
          this.isVideoEnabled = !this.isVideoEnabled;
          this.localStream.getVideoTracks().forEach(track => {
            track.enabled = this.isVideoEnabled;
          });
          const btn = e.currentTarget;
          if(this.isVideoEnabled) {
            btn.classList.add('active', 'bg-white', 'text-black');
            btn.classList.remove('bg-transparent', 'text-white');
          } else {
            btn.classList.remove('active', 'bg-white', 'text-black');
            btn.classList.add('bg-transparent', 'text-white');
          }
        });

        document.getElementById('liveQualitySelector').addEventListener('change', async (e) => {
          const quality = e.target.value;
          console.log('Changing video quality to:', quality);
          if (this.webrtc) {
            const success = await this.webrtc.setVideoQuality(quality);
            if (success) {
              this.mediaOptions.videoQuality = quality;
              console.log('Video quality changed successfully to:', quality);
            } else {
              console.error('Failed to change video quality to:', quality);
              e.target.value = this.mediaOptions.videoQuality || '720p';
            }
          }
        });

        document.getElementById('toggleScreen').addEventListener('click', async () => {
          try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const screenTrack = screenStream.getVideoTracks()[0];
            
            const videoTrack = this.localStream.getVideoTracks()[0];
            if (videoTrack) {
              videoTrack.stop();
              this.localStream.removeTrack(videoTrack);
            }
            
            this.localStream.addTrack(screenTrack);
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = this.localStream;
            
            document.getElementById('toggleScreen').classList.add('bg-white', 'text-black');
            
            screenTrack.onended = async () => {
              const newStream = await navigator.mediaDevices.getUserMedia({ video: true });
              const newVideoTrack = newStream.getVideoTracks()[0];
              this.localStream.addTrack(newVideoTrack);
              localVideo.srcObject = this.localStream;
              document.getElementById('toggleScreen').classList.remove('bg-white', 'text-black');
            };
          } catch (error) {
            console.error('Screen share error:', error);
          }
        });

        document.getElementById('togglePiP').addEventListener('click', async () => {
          const localVideo = document.getElementById('localVideo');
          try {
            if (!document.pictureInPictureEnabled) {
              console.log('PiP not supported');
              return;
            }
            if (document.pictureInPictureElement) {
              await document.exitPictureInPicture();
              document.getElementById('togglePiP').classList.remove('bg-white', 'text-black');
            } else if (localVideo.requestPictureInPicture) {
              await localVideo.requestPictureInPicture();
              document.getElementById('togglePiP').classList.add('bg-white', 'text-black');
            }
          } catch (error) {
            console.error('PiP error:', error);
          }
        });

        document.getElementById('leaveRoom').addEventListener('click', () => {
          this.leaveRoom();
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'd' || e.key === 'D') {
            document.getElementById('debugPanel').classList.toggle('hidden');
          }
        });
      },

      leaveRoom() {
        if (this.webrtc) {
          this.webrtc.destroy();
        }
        if (this.signaling) {
          this.signaling.destroy();
        }
        if (this.localStream) {
          this.localStream.getTracks().forEach(track => track.stop());
        }
        window.location.href = 'index.html';
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
</body>
