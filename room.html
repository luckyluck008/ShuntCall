<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShuntCall - Raum</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Fira Code', monospace;
      color: #00ff00;
      background-color: #000000;
    }
    @keyframes matrixRain {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .video-container {
      position: relative;
      background-color: #000000;
      border: 1px solid #00ff00;
      aspect-ratio: 16/9;
    }
    .video-container.local {
      border-color: #00aa00;
    }
    .video-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, transparent, rgba(255, 0, 255, 0.1), transparent);
      animation: hologram 4s linear infinite;
      z-index: 1;
      pointer-events: none;
    }
    .video-container:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.6), inset 0 0 60px rgba(0, 255, 255, 0.2);
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }
    .video-container.local {
      border: 3px solid #00ffff;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.5), inset 0 0 50px rgba(0, 255, 255, 0.2);
      animation: localGlow 2s ease-in-out infinite alternate;
    }

    .video-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }
    .peer-name {
      font-size: 0.875rem;
      color: #00ff00;
      font-family: 'Fira Code', monospace;
    }
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-connected { background: #00ff00; }
    .status-connecting { background: #ffff00; }
    .status-disconnected { background: #ff0000; }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .toolbar {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem;
      background-color: #111111;
      border: 1px solid #00ff00;
      z-index: 100;
    }
    .toolbar-btn {
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      border: 1px solid #00ff00;
      color: #00ff00;
    }
    .toolbar-btn:hover {
      background-color: #001100;
      border-color: #00aa00;
    }
    .toolbar-btn.active {
      background-color: #002200;
    }
    .toolbar-btn.danger {
      border-color: #ff0000;
      color: #ff0000;
    }
    .toolbar-btn.danger:hover {
      background-color: #110000;
    }
    @keyframes activePulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); }
      50% { box-shadow: 0 0 50px rgba(255, 0, 255, 0.8); }
    }
    .password-modal {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .password-modal input {
      background-color: #000000;
      border: 1px solid #00ff00;
      color: #00ff00;
      font-family: 'Fira Code', monospace;
    }
    .password-modal input:focus {
      border-color: #00aa00;
      outline: none;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-slide-in-up {
      animation: slideInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .animate-fade-in-scale {
      animation: fadeInScale 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  
  <!-- Password Modal -->
  <div id="passwordModal" class="password-modal">
    <div class="bg-black p-6 max-w-sm w-full border border-green-600">
      <h2 class="text-lg text-green-400 mb-4 text-center">[RAUM BEITRETEN]</h2>
      <p class="text-green-600 text-sm mb-4 text-center">Passwort eingeben:</p>
      <input type="password" id="roomPassword" class="w-full px-3 py-2 mb-4 text-green-400 placeholder-green-700" placeholder="Passwort">
      <button id="submitPassword" class="w-full bg-black border border-green-600 text-green-400 py-2 hover:bg-green-900">
        BEITRETEN
      </button>
      <p id="passwordError" class="text-red-400 mt-2 text-sm hidden text-center"></p>
    </div>
  </div>
        <h2 class="text-3xl font-normal text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-yellow-400 mb-2" style="font-family: 'Didot', serif;">Raum beitreten</h2>
        <p class="text-slate-300" style="font-family: 'Crimson Text', serif;">Gib das Passwort ein, um dem Raum beizutreten.</p>
      </div>
      <input type="password" id="roomPassword" class="w-full px-5 py-4 mb-6 text-white placeholder-slate-400 focus:outline-none transition-all duration-300" style="font-family: 'Crimson Text', serif;" placeholder="Passwort">
      <button id="submitPassword" class="w-full bg-gradient-to-r from-amber-400 to-yellow-500 hover:from-amber-500 hover:to-yellow-600 py-4 font-semibold text-lg shadow-lg hover:shadow-xl transition-all duration-300" style="font-family: 'Didot', serif; clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);">
        Beitreten
      </button>
      <p id="passwordError" class="text-red-400 mt-4 text-sm hidden text-center" style="font-family: 'Crimson Text', serif;"></p>
    </div>
  </div>

  <!-- Loading Screen -->
  <div id="loadingScreen" class="min-h-screen flex items-center justify-center p-4 hidden">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mx-auto mb-4"></div>
      <p class="text-gray-400" id="loadingText">Verbindung wird hergestellt...</p>
    </div>
  </div>

  <!-- Main Room -->
  <div id="room" class="hidden">
    
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-black p-4 border-b border-green-600">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-lg text-green-400">ShuntCall</h1>
          <p class="text-sm text-green-600">Raum: <span id="roomIdDisplay" class="text-green-500"></span></p>
        </div>
        <div class="flex items-center gap-4">
          <span id="peerCount" class="text-sm text-green-500">0 Teilnehmer</span>
          <button id="toggleDebug" class="px-2 py-1 bg-black border border-green-600 text-green-400 text-xs">Debug (D)</button>
        </div>
      </div>
    </header>

    <!-- Video Grid -->
    <div class="video-grid pt-20 pb-24" id="videoGrid">
      <!-- Local Video -->
      <div class="video-container local" id="localContainer">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-overlay">
          <span class="peer-name">Du</span>
          <div class="flex items-center gap-2">
            <span class="status-indicator status-connected"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="toggleMic" class="toolbar-btn" title="Mikrofon">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
        </svg>
      </button>
      <button id="toggleCamera" class="toolbar-btn" title="Kamera">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
      </button>
      <button id="toggleScreen" class="toolbar-btn" title="Bildschirm teilen">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
      </button>
      <button id="togglePiP" class="toolbar-btn" title="Bild-in-Bild">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
        </svg>
      </button>
      <button id="leaveRoom" class="toolbar-btn danger" title="Verlassen">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"></path>
        </svg>
      </button>
    </div>

    <!-- Debug Panel -->
    <div id="debugPanel" class="fixed bottom-24 right-6 bg-gray-900/95 backdrop-blur-xl p-6 rounded-2xl text-xs font-mono hidden max-w-md border border-white/10 shadow-2xl">
      <div class="flex items-center gap-2 mb-4">
        <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <h3 class="font-bold text-white">Debug Info</h3>
      </div>
      <div id="debugContent" class="text-gray-300 space-y-1"></div>
    </div>
  </div>

  <script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/nostr.js"></script>
  <script src="js/nostr-signaling.js"></script>
  <script src="js/webrtc.js"></script>

  <script>
    // Security check for getUserMedia
    (function() {
      const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      if (!isSecure) {
        document.write('<div style="background:#ef4444;color:white;padding:1rem;text-align:center;font-weight:bold;">⚠️ HTTPS erforderlich!</div>');
      }
    })();

    const App = {
      roomId: null,
      password: null,
      roomTag: null,
      localStream: null,
      peers: new Map(),
      signaling: null,
      webrtc: null,
      isAudioEnabled: true,
      isVideoEnabled: true,

      async init() {
        const params = new URLSearchParams(window.location.search);
        this.roomId = params.get('room');
        
        if (!this.roomId) {
          window.location.href = 'index.html';
          return;
        }

        document.getElementById('roomIdDisplay').textContent = this.roomId;

        this.setupPasswordModal();
      },

      setupPasswordModal() {
        // Check if password is in sessionStorage (when creator joins their own room)
        const storedPassword = sessionStorage.getItem('shuntcall_password');
        const storedRoomId = sessionStorage.getItem('shuntcall_roomId');
        
        console.log('Stored password:', storedPassword ? 'yes' : 'no');
        console.log('Stored roomId:', storedRoomId);
        
        if (storedPassword && storedRoomId === this.roomId) {
          console.log('Using stored password');
          this.password = storedPassword;
          sessionStorage.removeItem('shuntcall_roomId');
          sessionStorage.removeItem('shuntcall_password');
          // Hide modal first, then init
          document.getElementById('passwordModal').style.display = 'none';
          this.initRoom();
          return;
        }

        // Show the modal if no stored password
        document.getElementById('passwordModal').style.display = 'flex';
        
        const modal = document.getElementById('passwordModal');
        const input = document.getElementById('roomPassword');
        const submit = document.getElementById('submitPassword');
        const error = document.getElementById('passwordError');

        submit.addEventListener('click', async () => {
          const password = input.value.trim();
          if (!password) {
            error.textContent = 'Bitte gib ein Passwort ein';
            error.classList.remove('hidden');
            return;
          }
          
          this.password = password;
          document.getElementById('passwordModal').style.display = 'none';
          await this.initRoom();
        });

        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            submit.click();
          }
        });
      },

      async initRoom() {
        document.getElementById('passwordModal').classList.add('hidden');
        this.showLoading('Verbinde zu Nostr...');

        try {
          // Compute room tag from roomId + password
          this.roomTag = await this.computeRoomTag(this.roomId, this.password);
          console.log('Room tag:', this.roomTag);

          // Initialize media
          await this.initMedia();

           // Initialize Nostr signaling
          this.signaling = NostrSignaling;
          console.log('Initializing signaling...');
          await this.signaling.init(this.roomId, this.password);
          console.log('Signaling initialized');

          // Get our pubkey after initialization
          const ourPubkey = this.signaling.nostr.keys.publicKey;
          console.log('Our pubkey:', ourPubkey.slice(0, 16) + '...');

          // Initialize WebRTC
          this.webrtc = ShuntCallWebRTC;
          this.webrtc.init(this.localStream, ourPubkey, this.signaling);

          // Setup WebRTC event handlers
          this.webrtc.on('remoteStream', (data) => {
            console.log('Remote stream from:', data.peerId.slice(0, 16) + '...');
            this.addRemoteStream(data.peerId, data.stream);
          });

          this.webrtc.on('connectionStateChange', (data) => {
            console.log('Connection state:', data.peerId?.slice(0, 16), data.state);
            this.updatePeerStatus(data.peerId, data.state);
          });



           // Broadcast our presence so existing peers can connect to us
           console.log('Broadcasting presence...');
           await this.signaling.broadcastPresence();

          this.setupEventListeners();
          this.updatePeerCount();

          document.getElementById('loadingScreen').classList.add('hidden');
          document.getElementById('room').classList.remove('hidden');

        } catch (error) {
          console.error('Init error:', error);
          alert('Verbindung fehlgeschlagen: ' + error.message);
          window.location.href = 'index.html';
        }
      },

      async computeRoomTag(roomId, password) {
        const input = roomId + ':' + password;
        const encoder = new TextEncoder();
        const data = encoder.encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      },

      showLoading(text) {
        document.getElementById('loadingText').textContent = text;
        document.getElementById('loadingScreen').classList.remove('hidden');
        document.getElementById('room').classList.add('hidden');
      },

       async initMedia() {
        const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (!isSecure) {
          alert('Kamera-Zugriff erfordert HTTPS oder localhost!');
          return;
        }

        // Show media permission prompt
        this.showMediaPermissionModal();
        
        // Wait for user to confirm media access
        await new Promise((resolve, reject) => {
          this.mediaPermissionResolve = resolve;
          this.mediaPermissionReject = reject;
        });

        try {
          this.localStream = await navigator.mediaDevices.getUserMedia({
            video: this.mediaOptions.video,
            audio: this.mediaOptions.audio
          });

          const localVideo = document.getElementById('localVideo');
          localVideo.srcObject = this.localStream;
          
          console.log('Media initialized');
        } catch (error) {
          console.error('Media error:', error);
          alert('Kamera/Mikrofon Fehler: ' + error.message);
          throw error;
        }
      },

      showMediaPermissionModal() {
        // Create media permission modal
        const modal = document.createElement('div');
        modal.className = 'password-modal';
        modal.id = 'mediaPermissionModal';
        modal.innerHTML = `
          <div class="bg-gray-800 p-8 rounded-2xl max-w-md w-full">
            <h2 class="text-2xl font-bold mb-4">Medienzugriff</h2>
            <p class="text-gray-400 mb-6">Bitte wähle, welche Medien du teilen möchtest:</p>
            
            <div class="space-y-4 mb-6">
              <label class="flex items-center gap-3">
                <input type="checkbox" id="enableVideo" checked class="w-4 h-4 text-indigo-600 rounded">
                <span>Kamera</span>
              </label>
              <label class="flex items-center gap-3">
                <input type="checkbox" id="enableAudio" checked class="w-4 h-4 text-indigo-600 rounded">
                <span>Mikrofon</span>
              </label>
            </div>
            
            <div class="flex gap-3">
              <button id="mediaPermissionAccept" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-semibold">
                Akzeptieren
              </button>
              <button id="mediaPermissionDecline" class="flex-1 bg-gray-600 hover:bg-gray-700 py-3 rounded-lg font-semibold">
                Ablehnen
              </button>
            </div>
          </div>
        `;
        
        document.body.appendChild(modal);
        
        // Set default media options
        this.mediaOptions = {
          video: true,
          audio: true
        };
        
        // Add event listeners
        document.getElementById('enableVideo').addEventListener('change', (e) => {
          this.mediaOptions.video = e.target.checked;
        });
        
        document.getElementById('enableAudio').addEventListener('change', (e) => {
          this.mediaOptions.audio = e.target.checked;
        });
        
        document.getElementById('mediaPermissionAccept').addEventListener('click', () => {
          modal.remove();
          this.mediaPermissionResolve();
        });
        
        document.getElementById('mediaPermissionDecline').addEventListener('click', () => {
          modal.remove();
          this.mediaPermissionReject(new Error('Medienzugriff abgelehnt'));
        });
      },

      addRemoteStream(peerId, stream) {
        if (this.peers.has(peerId)) return;
        
        const grid = document.getElementById('videoGrid');
        
        const container = document.createElement('div');
        container.className = 'video-container';
        container.id = `container-${peerId}`;
        
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.srcObject = stream;
        
        const overlay = document.createElement('div');
        overlay.className = 'video-overlay';

        overlay.innerHTML = `
          <span class="peer-name">${peerId.slice(0, 8)}...</span>
          <div class="flex items-center gap-2">
            <span class="status-indicator status-connected" id="status-${peerId}"></span>
          </div>
        `;

        container.appendChild(video);
        container.appendChild(overlay);
        container.classList.add('animate-fade-in-scale');
        grid.appendChild(container);
        
        this.peers.set(peerId, { stream, container });
        this.updatePeerCount();
      },

      removePeer(peerId) {
        const peer = this.peers.get(peerId);
        if (peer) {
          peer.container.remove();
          this.peers.delete(peerId);
        }
        
        if (this.webrtc) {
          this.webrtc.closePeerConnection(peerId);
        }
        
        this.updatePeerCount();
      },

      updatePeerStatus(peerId, state) {
        const statusEl = document.getElementById(`status-${peerId}`);
        if (statusEl) {
          statusEl.className = 'status-indicator';
          if (state === 'connected') {
            statusEl.classList.add('status-connected');
          } else if (state === 'connecting' || state === 'new') {
            statusEl.classList.add('status-connecting');
          } else {
            statusEl.classList.add('status-disconnected');
          }
        }
      },

      updatePeerCount() {
        const count = this.peers.size + 1;
        document.getElementById('peerCount').textContent = `${count} Teilnehmer`;
      },

      setupEventListeners() {
        document.getElementById('toggleMic').addEventListener('click', () => {
          this.isAudioEnabled = !this.isAudioEnabled;
          this.localStream.getAudioTracks().forEach(track => {
            track.enabled = this.isAudioEnabled;
          });
          document.getElementById('toggleMic').classList.toggle('active', this.isAudioEnabled);
        });

        document.getElementById('toggleCamera').addEventListener('click', () => {
          this.isVideoEnabled = !this.isVideoEnabled;
          this.localStream.getVideoTracks().forEach(track => {
            track.enabled = this.isVideoEnabled;
          });
          document.getElementById('toggleCamera').classList.toggle('active', this.isVideoEnabled);
        });

        document.getElementById('toggleScreen').addEventListener('click', async () => {
          try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const screenTrack = screenStream.getVideoTracks()[0];
            
            const videoTrack = this.localStream.getVideoTracks()[0];
            if (videoTrack) {
              videoTrack.stop();
              this.localStream.removeTrack(videoTrack);
            }
            
            this.localStream.addTrack(screenTrack);
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = this.localStream;
            
            screenTrack.onended = async () => {
              const newStream = await navigator.mediaDevices.getUserMedia({ video: true });
              const newVideoTrack = newStream.getVideoTracks()[0];
              this.localStream.addTrack(newVideoTrack);
              localVideo.srcObject = this.localStream;
            };
          } catch (error) {
            console.error('Screen share error:', error);
          }
        });

        document.getElementById('togglePiP').addEventListener('click', async () => {
          const localVideo = document.getElementById('localVideo');
          try {
            if (!document.pictureInPictureEnabled) {
              console.log('PiP not supported');
              return;
            }
            if (document.pictureInPictureElement) {
              await document.exitPictureInPicture();
            } else if (localVideo.requestPictureInPicture) {
              await localVideo.requestPictureInPicture();
            }
          } catch (error) {
            console.error('PiP error:', error);
          }
        });

        document.getElementById('leaveRoom').addEventListener('click', () => {
          this.leaveRoom();
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'd' || e.key === 'D') {
            document.getElementById('debugPanel').classList.toggle('hidden');
          }
        });
      },

      leaveRoom() {
        if (this.webrtc) {
          this.webrtc.destroy();
        }
        if (this.signaling) {
          this.signaling.destroy();
        }
        if (this.localStream) {
          this.localStream.getTracks().forEach(track => track.stop());
        }
        window.location.href = 'index.html';
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
</body>
</html>
