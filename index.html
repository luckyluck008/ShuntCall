<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShuntCall - P2P Video Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="js/crypto.js"></script>
  <script src="js/manual-p2p.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .input-field { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
    .input-field:focus { border-color: #6366f1; outline: none; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.4); }
    .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white">
  <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4">
    
    <!-- Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 mb-4">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
      </div>
      <h1 class="text-5xl font-bold mb-2 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">ShuntCall</h1>
      <p class="text-gray-400 text-lg">P2P Videokonferenz ohne Server</p>
    </div>

    <!-- Main Cards Container -->
    <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl">
      
      <!-- Create Room Card -->
      <div class="card rounded-2xl p-8 flex-1">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
          <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Raum erstellen
        </h2>
        
        <form id="createForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Raum-ID</label>
            <div class="flex gap-2">
              <input type="text" id="createRoomId" class="input-field flex-1 px-4 py-3 rounded-lg" placeholder="mein-raum">
              <button type="button" id="generateId" class="btn-secondary px-4 py-2 rounded-lg" title="Zufällige ID generieren">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
              </button>
            </div>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Passwort</label>
            <input type="password" id="createPassword" class="input-field w-full px-4 py-3 rounded-lg" placeholder="Sicheres Passwort">
          </div>
          
          <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold">
            Raum erstellen
          </button>
        </form>
        
        <!-- Loading Section -->
        <div id="loadingSection" class="text-center py-8 hidden">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500 mx-auto mb-4"></div>
          <p class="text-gray-400">Kamera wird gestartet...</p>
        </div>
      </div>

      <!-- Join Room Card -->
      <div class="card rounded-2xl p-8 flex-1">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
          <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
          </svg>
          Raum beitreten
        </h2>
        
        <form id="joinForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Einladungslink</label>
            <input type="text" id="joinLink" class="input-field w-full px-4 py-3 rounded-lg" placeholder="https://...">
          </div>
          
          <button type="submit" class="btn-secondary w-full py-3 rounded-lg font-semibold">
            Raum beitreten
          </button>
        </form>
      </div>
    </div>

    <!-- Share Link Section -->
    <div id="shareSection" class="card rounded-2xl p-6 mt-8 w-full max-w-2xl hidden">
      <h3 class="text-lg font-semibold mb-3">Einladungslink (teilen mit anderen)</h3>
      <div class="flex gap-2">
        <input type="text" id="shareLink" class="input-field flex-1 px-4 py-3 rounded-lg text-sm" readonly>
        <button type="button" id="copyLink" class="btn-primary px-6 py-2 rounded-lg font-medium">
          Kopieren
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden mt-4 px-6 py-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300">
    </div>

    <!-- Footer -->
    <footer class="mt-12 text-center text-gray-500 text-sm">
      <p>100% P2P • Kein Server • Keine Anmeldung</p>
    </footer>

  </div>

  <script>
    function generateRoomId() {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      let result = '';
      for (let i = 0; i < 8; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    document.getElementById('generateId').addEventListener('click', () => {
      document.getElementById('createRoomId').value = generateRoomId();
    });

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
      setTimeout(() => errorEl.classList.add('hidden'), 5000);
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const roomId = document.getElementById('createRoomId').value.trim();
      const password = document.getElementById('createPassword').value;

      if (!roomId) {
        showError('Bitte gib eine Raum-ID ein');
        return;
      }
      if (!password) {
        showError('Bitte gib ein Passwort ein');
        return;
      }

      const encoder = new TextEncoder();
      const data = encoder.encode(roomId + ':' + password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      document.getElementById('createForm').classList.add('hidden');
      document.getElementById('loadingSection').classList.remove('hidden');

      try {
        const localStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 },
          audio: true
        });

        const p2pData = await ManualP2P.createRoom(localStream);
        
        localStream.getTracks().forEach(track => track.stop());

        const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
        const shareLink = `${baseUrl}room.html?room=${encodeURIComponent(roomId)}&hash=${hash}&data=${p2pData.roomData}`;

        document.getElementById('loadingSection').classList.add('hidden');
        document.getElementById('shareLink').value = shareLink;
        document.getElementById('shareSection').classList.remove('hidden');

      } catch (error) {
        console.error('Error creating room:', error);
        let msg = 'Kamera/Mikrofon konnte nicht accessiert werden';
        if (error.name === 'NotAllowedError') {
          msg = 'Zugriff verweigert. Bitte erlaube Kamera/Mikrofon im Browser.';
        } else if (error.name === 'NotFoundError') {
          msg = 'Keine Kamera/Mikrofon gefunden.';
        }
        showError(msg);
        document.getElementById('loadingSection').classList.add('hidden');
        document.getElementById('createForm').classList.remove('hidden');
      }
    });

    document.getElementById('joinForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const joinLink = document.getElementById('joinLink').value.trim();

      if (!joinLink) {
        showError('Bitte füge den Einladungslink ein');
        return;
      }

      window.location.href = joinLink;
    });

    document.getElementById('copyLink').addEventListener('click', () => {
      const linkInput = document.getElementById('shareLink');
      linkInput.select();
      navigator.clipboard.writeText(linkInput.value);
      
      const btn = document.getElementById('copyLink');
      btn.textContent = 'Kopiert!';
      setTimeout(() => btn.textContent = 'Kopieren', 2000);
    });

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('room')) {
      document.getElementById('joinLink').value = window.location.href;
    }
  </script>
</body>
</html>
